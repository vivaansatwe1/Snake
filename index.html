<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake AI</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
</head>
<body>

    <div id="password-gate" class="overlay">
        <div class="gate-box">
            <h2>Snake AI Access</h2>
            <p>Please enter your access password to decrypt system parameters.</p>
            <input type="password" id="gate-password-input" placeholder="Password">
            <button id="gate-login-btn">Unlock Systems</button>
            <p id="gate-error" class="error-text"></p>
        </div>
    </div>

    <div id="chat-container" class="chat-container hidden">
        
        <header class="chat-header">
            <h1>Snake AI</h1>
        </header>

        <main id="chat-window" class="chat-window">
            <div class="message-row bot-row">
                <div class="message-bubble bot-bubble">
                    Snake AI online. Core modules decrypted. System independent. How can I assist you?
                </div>
            </div>
        </main>

        <footer class="chat-footer">
            <form id="chat-form">
                <input type="text" id="user-input" placeholder="Type your message here..." required autocomplete="off">
                <button type="submit" id="send-btn">Send</button>
            </form>
        </footer>

    </div>

    <script src="script.js"></script>
</body>
</html>
